# Agile360 – desenvolvimento local
# Uso: docker compose up --build

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # Substituir por variáveis reais ou usar .env
      - ConnectionStrings__Supabase=${ConnectionStrings__Supabase:-Host=host.docker.internal;Port=5432;Database=agile360;Username=postgres;Password=postgres}
      - JwtSettings__Issuer=${JwtSettings__Issuer:-https://localhost}
      - JwtSettings__Audience=${JwtSettings__Audience:-authenticated}
      - JwtSettings__Secret=${JwtSettings__Secret:-}
    networks:
      - agile360
    restart: unless-stopped

networks:
  agile360:
    driver: bridge
